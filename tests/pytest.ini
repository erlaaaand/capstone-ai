[pytest]
# ─────────────────────────────────────────────────────────────────────────────
#  Konfigurasi pytest untuk Enterprise Durian Classification API
# ─────────────────────────────────────────────────────────────────────────────

# Direktori test
testpaths = tests

# Pola penamaan file & fungsi test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opsi default
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Marker kustom
markers =
    unit:        Test unit — cepat, tanpa I/O eksternal
    integration: Test integrasi — melibatkan FastAPI TestClient
    slow:        Test lambat (>1 detik)
    api:         Test endpoint API
    security:    Test keamanan & autentikasi
    inference:   Test inferensi model ONNX
    image:       Test pemrosesan gambar

# Timeout per test (detik) — membutuhkan pytest-timeout
# timeout = 30

# Coverage (jalankan dengan: pytest --cov=. --cov-report=html)
# Uncomment jika pytest-cov terpasang:
# [coverage:run]
# source = app, core, models, schemas, services
# omit = tests/*, pipelines/*, */__init__.py
